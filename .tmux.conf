# unbinds
unbind C-b
unbind b

# set C-a as prefix key
set-option -g prefix C-a

# pass through C-a
bind-key a send-prefix

# enable ctrl-arrow keys
set-window-option -g xterm-keys on

# set the status bar
set-option -g status-style bg=default,fg=white
set-option -g status-left ''
set-option -g status-right ''
set-window-option -g window-status-current-style bg=red

# reload config
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"

# toggle between windows
bind-key C-a last-window

# set notifications
setw -g monitor-activity on
set -g visual-activity on

# split panes
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# faster key repitition
set-option -s escape-time 0

# all shortcuts will use the vi mode shortcuts
set-window-option -g mode-keys vi

# toggle between two panes
bind-key l select-pane -R
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U

# resize panes
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

# set tmux colorscheme for solarized
set -g default-terminal "xterm-256color"

# open new windows in the same directory
bind-key c new-window -c "#{pane_current_path}"

# set max scroll histor limit
set-option -g history-limit 10000

# set a pane border
set -g pane-border-status bottom
set -g pane-border-format '#{pane_current_command}'

# even splitting (default)
bind-key M-1 select-layout even-vertical
bind-key M-2 select-layout even-horizontal

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# toggle mouse on/off
# turning on mouse always can mess up clicking for links!
bind-key m if-shell "tmux show-option -gv mouse | grep -q on" \
  "set-option -g mouse off; display-message 'Mouse OFF'" \
  "set-option -g mouse on;  display-message 'Mouse ON'"

# catppuccin settings must come BEFORE the run line — plugin reads them at load time
set -g @catppuccin_flavor "macchiato"

# window: command name only (no arguments)
set -g @catppuccin_window_current_text '#{pane_current_command}'
set -g @catppuccin_window_text '#{pane_current_command}'

# this should come *after* all catppuccin settings are set
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# override catppuccin: transparent status bar
set -g status-style bg=default

# pane borders: dim inactive, yellow active
set -g pane-border-style 'fg=#6e5a38'
set -g pane-active-border-style 'fg=#eed49f'
